<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Log Classifier Dashboard</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, sans-serif; background: #0f172a; color: #e2e8f0; padding: 2rem; }
    h1 { font-size: 1.5rem; margin-bottom: 0.25rem; color: #f8fafc; }
    .subtitle { color: #64748b; font-size: 0.875rem; margin-bottom: 1.5rem; }

    .tabs { display: flex; gap: 0.5rem; margin-bottom: 2rem; border-bottom: 1px solid #1e293b; padding-bottom: 0; }
    .tab { padding: 0.6rem 1.25rem; border-radius: 8px 8px 0 0; cursor: pointer; font-size: 0.875rem; color: #64748b; background: transparent; border: none; }
    .tab.active { background: #1e293b; color: #f8fafc; font-weight: 600; }
    .tab:hover:not(.active) { color: #94a3b8; }

    .view { display: none; }
    .view.active { display: block; }

    .cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 1rem; margin-bottom: 2rem; }
    .card { background: #1e293b; border-radius: 12px; padding: 1.25rem; }
    .card .label { font-size: 0.75rem; color: #64748b; text-transform: uppercase; letter-spacing: 0.05em; }
    .card .value { font-size: 2rem; font-weight: 700; margin-top: 0.25rem; }
    .error { color: #f87171; } .warning { color: #fbbf24; } .info { color: #34d399; } .unknown { color: #94a3b8; } .total { color: #818cf8; }

    .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem; margin-bottom: 2rem; }
    .panel { background: #1e293b; border-radius: 12px; padding: 1.5rem; }
    .panel h2 { font-size: 0.875rem; color: #64748b; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 1rem; }
    .chart-wrap { position: relative; height: 220px; }

    .controls { display: flex; gap: 1rem; margin-bottom: 1.5rem; flex-wrap: wrap; }
    .search-input { flex: 1; min-width: 200px; padding: 0.6rem 1rem; background: #1e293b; border: 1px solid #334155; border-radius: 8px; color: #e2e8f0; font-size: 0.875rem; outline: none; }
    .search-input:focus { border-color: #818cf8; }
    .filter-btn { padding: 0.6rem 1rem; border-radius: 8px; border: 1px solid #334155; background: #1e293b; color: #94a3b8; font-size: 0.875rem; cursor: pointer; }
    .filter-btn.active { border-color: currentColor; font-weight: 600; }
    .filter-btn.ALL.active { color: #818cf8; border-color: #818cf8; }
    .filter-btn.ERROR.active { color: #f87171; border-color: #f87171; }
    .filter-btn.WARNING.active { color: #fbbf24; border-color: #fbbf24; }
    .filter-btn.INFO.active { color: #34d399; border-color: #34d399; }
    .filter-btn.UNKNOWN.active { color: #94a3b8; border-color: #94a3b8; }

    .all-logs-panel { background: #1e293b; border-radius: 12px; padding: 1.5rem; }
    .table-meta { font-size: 0.8rem; color: #64748b; margin-bottom: 1rem; }

    table { width: 100%; border-collapse: collapse; font-size: 0.875rem; }
    th { text-align: left; color: #64748b; font-weight: 500; padding: 0.5rem 0.75rem; border-bottom: 1px solid #334155; cursor: pointer; user-select: none; }
    th:hover { color: #94a3b8; }
    td { padding: 0.6rem 0.75rem; border-bottom: 1px solid #0f172a; }
    tr:hover td { background: #263548; }

    .badge { display: inline-block; padding: 0.15rem 0.5rem; border-radius: 999px; font-size: 0.75rem; font-weight: 600; }
    .badge.ERROR { background: #450a0a; color: #f87171; }
    .badge.WARNING { background: #451a03; color: #fbbf24; }
    .badge.INFO { background: #052e16; color: #34d399; }
    .badge.UNKNOWN { background: #1e293b; color: #94a3b8; border: 1px solid #334155; }

    .pagination { display: flex; justify-content: space-between; align-items: center; margin-top: 1rem; font-size: 0.875rem; color: #64748b; }
    .page-btns { display: flex; gap: 0.5rem; }
    .page-btn { padding: 0.4rem 0.8rem; background: #0f172a; border: 1px solid #334155; border-radius: 6px; color: #94a3b8; cursor: pointer; font-size: 0.8rem; }
    .page-btn:hover:not(:disabled) { border-color: #818cf8; color: #818cf8; }
    .page-btn:disabled { opacity: 0.4; cursor: not-allowed; }

    @media (max-width: 600px) { .grid { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
  <h1>🔍 Log Classifier Dashboard</h1>
  <p class="subtitle">Real-time classification overview</p>

  <div class="tabs">
    <button class="tab active" onclick="switchTab('overview')">Overview</button>
    <button class="tab" onclick="switchTab('logs')">All Logs</button>
  </div>

  <!-- OVERVIEW TAB -->
  <div id="view-overview" class="view active">
    <div class="cards">
      <div class="card"><div class="label">Total</div><div class="value total" id="total">—</div></div>
      <div class="card"><div class="label">Errors</div><div class="value error" id="count-ERROR">—</div></div>
      <div class="card"><div class="label">Warnings</div><div class="value warning" id="count-WARNING">—</div></div>
      <div class="card"><div class="label">Info</div><div class="value info" id="count-INFO">—</div></div>
      <div class="card"><div class="label">Unknown</div><div class="value unknown" id="count-UNKNOWN">—</div></div>
    </div>
    <div class="grid">
      <div class="panel">
        <h2>Distribution</h2>
        <div class="chart-wrap"><canvas id="donut"></canvas></div>
      </div>
      <div class="panel">
        <h2>Recent Logs</h2>
        <table>
          <thead><tr><th>#</th><th>Message</th><th>Label</th></tr></thead>
          <tbody id="recent-table"></tbody>
        </table>
      </div>
    </div>
  </div>

  <!-- ALL LOGS TAB -->
  <div id="view-logs" class="view">
    <div class="controls">
      <input class="search-input" id="search" placeholder="Search messages..." oninput="applyFilters()">
      <button class="filter-btn ALL active" onclick="setFilter('ALL')">All</button>
      <button class="filter-btn ERROR" onclick="setFilter('ERROR')">Error</button>
      <button class="filter-btn WARNING" onclick="setFilter('WARNING')">Warning</button>
      <button class="filter-btn INFO" onclick="setFilter('INFO')">Info</button>
      <button class="filter-btn UNKNOWN" onclick="setFilter('UNKNOWN')">Unknown</button>
    </div>
    <div class="all-logs-panel">
      <div class="table-meta" id="table-meta"></div>
      <table>
        <thead>
          <tr>
            <th onclick="sortBy('id')"># ↕</th>
            <th onclick="sortBy('message')">Message ↕</th>
            <th onclick="sortBy('label')">Label ↕</th>
            <th onclick="sortBy('timestamp')">Timestamp ↕</th>
          </tr>
        </thead>
        <tbody id="all-logs-table"></tbody>
      </table>
      <div class="pagination">
        <span id="page-info"></span>
        <div class="page-btns">
          <button class="page-btn" id="btn-prev" onclick="changePage(-1)">← Prev</button>
          <button class="page-btn" id="btn-next" onclick="changePage(1)">Next →</button>
        </div>
      </div>
    </div>
  </div>

  <script>
    let allLogs = [];
    let filtered = [];
    let currentFilter = 'ALL';
    let currentSort = { key: 'id', dir: -1 };
    let page = 1;
    const PAGE_SIZE = 20;

    function switchTab(name) {
      document.querySelectorAll('.tab').forEach((t, i) => t.classList.toggle('active', ['overview','logs'][i] === name));
      document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
      document.getElementById('view-' + name).classList.add('active');
    }

    function setFilter(f) {
      currentFilter = f;
      page = 1;
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.toggle('active', b.classList.contains(f)));
      applyFilters();
    }

    function sortBy(key) {
      if (currentSort.key === key) currentSort.dir *= -1;
      else { currentSort.key = key; currentSort.dir = 1; }
      applyFilters();
    }

    function applyFilters() {
      const q = document.getElementById('search').value.toLowerCase();
      filtered = allLogs
        .filter(l => (currentFilter === 'ALL' || l.label === currentFilter) && l.message.toLowerCase().includes(q))
        .sort((a, b) => {
          let av = a[currentSort.key], bv = b[currentSort.key];
          if (typeof av === 'string') av = av.toLowerCase(), bv = bv.toLowerCase();
          return av < bv ? -currentSort.dir : av > bv ? currentSort.dir : 0;
        });
      renderTable();
    }

    function renderTable() {
      const start = (page - 1) * PAGE_SIZE;
      const slice = filtered.slice(start, start + PAGE_SIZE);
      const tbody = document.getElementById('all-logs-table');
      tbody.innerHTML = slice.map(l => `
        <tr>
          <td style="color:#475569">${l.id}</td>
          <td>${l.message}</td>
          <td><span class="badge ${l.label}">${l.label}</span></td>
          <td style="color:#64748b;font-size:0.8rem">${new Date(l.timestamp).toLocaleString()}</td>
        </tr>`).join('');
      document.getElementById('table-meta').textContent = `${filtered.length} records`;
      document.getElementById('page-info').textContent = `Page ${page} of ${Math.max(1, Math.ceil(filtered.length / PAGE_SIZE))}`;
      document.getElementById('btn-prev').disabled = page === 1;
      document.getElementById('btn-next').disabled = page >= Math.ceil(filtered.length / PAGE_SIZE);
    }

    function changePage(dir) {
      page += dir;
      renderTable();
    }

    async function load() {
      const res = await fetch('/logs');
      allLogs = await res.json();

      const counts = { ERROR: 0, WARNING: 0, INFO: 0, UNKNOWN: 0 };
      allLogs.forEach(l => { if (counts[l.label] !== undefined) counts[l.label]++; });

      document.getElementById('total').textContent = allLogs.length;
      Object.keys(counts).forEach(k => document.getElementById('count-' + k).textContent = counts[k]);

      new Chart(document.getElementById('donut'), {
        type: 'doughnut',
        data: {
          labels: ['ERROR', 'WARNING', 'INFO', 'UNKNOWN'],
          datasets: [{ data: [counts.ERROR, counts.WARNING, counts.INFO, counts.UNKNOWN],
            backgroundColor: ['#f87171','#fbbf24','#34d399','#94a3b8'], borderWidth: 0 }]
        },
        options: { cutout: '70%', plugins: { legend: { labels: { color: '#94a3b8' } } } }
      });

      const tbody = document.getElementById('recent-table');
      allLogs.slice(-10).reverse().forEach(l => {
        tbody.innerHTML += `<tr>
          <td style="color:#475569">${l.id}</td>
          <td style="max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${l.message}</td>
          <td><span class="badge ${l.label}">${l.label}</span></td>
        </tr>`;
      });

      applyFilters();
    }

    load();
  </script>
</body>
</html>
